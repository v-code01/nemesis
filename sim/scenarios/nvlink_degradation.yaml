# NVLink bandwidth degradation scenario — validates NVLINK_DEGRADED event and nvlink_reset playbook
# gpu-3 bandwidth drops to 10% of nominal (60 Gbps from 600 Gbps) over 1 hour
scenario: nvlink_degradation
description: NVLink bandwidth on gpu-3 degrades to 10% of nominal — validates NVLINK_DEGRADED event and playbook
seed: 42

timeline:
  - t: 0s
    action: normal_operation
  - t: 1800s
    gpu: gpu-3
    action: set_nvlink_bandwidth
    rate: 180.0
  - t: 3600s
    gpu: gpu-3
    action: set_nvlink_bandwidth
    rate: 60.0

expected_outcomes:
  event_emitted: NVLINK_DEGRADED
  playbook_triggered: nvlink_reset
