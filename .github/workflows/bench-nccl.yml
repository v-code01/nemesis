name: bench-nccl

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.78"

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sim/crates/nemesis-sim/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Build nemesis-sim
        run: |
          cd sim/crates/nemesis-sim && cargo build --release

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install agents package
        run: |
          pip install grpcio-tools
          make proto-gen
          cd agents && pip install -e ".[dev]"

      - name: Create results directory
        run: mkdir -p results

      - name: Run P3 NCCL shrink benchmark
        run: |
          python benchmarks/p3_nccl_shrink/run_full.py \
            --seed 42 \
            --output results/nccl.json

      - name: Assert resumption gate (< 30s)
        run: |
          python benchmarks/assert_gate.py \
            --result results/nccl.json \
            --metric resumption_seconds \
            --max 30

      - name: Assert restart gate (= 0)
        run: |
          python benchmarks/assert_gate.py \
            --result results/nccl.json \
            --metric job_restart_count \
            --max 0

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-nccl-results
          path: results/nccl.json
